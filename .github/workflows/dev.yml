name: Push to Dev

on:
  push:
    branches:
      - dev

jobs:
  notify:
    name: Dev branch updated
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm push
        run: |
          echo "✅ Successfully pushed to dev branch"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"
          echo "Message: ${{ github.event.head_commit.message }}"
